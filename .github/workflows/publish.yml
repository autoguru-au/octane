name: Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/CHANGELOG.md'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm for OIDC Trusted Publishing
        run: npm install -g npm@11

      - name: Install Monorepo Dependencies
        uses: ./.github/actions/bun-install

      - name: Verify npm OIDC readiness
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          NPM_VERSION=$(npm --version)
          NPM_MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          NPM_MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$NPM_MAJOR" -lt 11 ] || { [ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 5 ]; }; then
            echo "::error::npm $NPM_VERSION does not support OIDC Trusted Publishing (requires >= 11.5.0)"
            exit 1
          fi
          echo "npm $NPM_VERSION supports OIDC Trusted Publishing"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token request URL is available"
          else
            echo "::error::ACTIONS_ID_TOKEN_REQUEST_URL is not set — id-token: write permission may be missing"
            exit 1
          fi
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-<unset>}"
          echo "npm config:"
          npm config list

      - name: Build all packages
        run: bun run build:all

      - name: Save existing tags
        run: git tag -l | sort > /tmp/tags-before

      - name: Publish to npm
        run: bun run changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push release tags and create GitHub releases
        run: |
          git tag -l | sort > /tmp/tags-after
          NEW_TAGS=$(comm -13 /tmp/tags-before /tmp/tags-after)
          if [ -z "$NEW_TAGS" ]; then
            echo "No new tags created — nothing to release"
            exit 0
          fi

          echo "New tags:"
          echo "$NEW_TAGS"
          git push origin $NEW_TAGS

          for tag in $NEW_TAGS; do
            VERSION="${tag##*@}"
            PKG_NAME="${tag%@${VERSION}}"

            # Find the package directory by matching the name in package.json
            BODY=""
            for pkg_json in $(find packages -name package.json -not -path '*/node_modules/*'); do
              if grep -q "\"name\": \"${PKG_NAME}\"" "$pkg_json" 2>/dev/null; then
                changelog="$(dirname "$pkg_json")/CHANGELOG.md"
                if [ -f "$changelog" ]; then
                  BODY=$(awk "/^## ${VERSION}$/{found=1; next} /^## /{found=0} found" "$changelog")
                fi
                break
              fi
            done

            if [ -n "$BODY" ]; then
              echo "$BODY" | gh release create "$tag" --title "$tag" --notes-file -
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
            echo "Created release: $tag"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
