name: Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/CHANGELOG.md'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm for OIDC Trusted Publishing
        run: npm install -g npm@11

      - name: Install Monorepo Dependencies
        uses: ./.github/actions/bun-install

      - name: Verify npm OIDC readiness
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          NPM_VERSION=$(npm --version)
          NPM_MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          NPM_MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$NPM_MAJOR" -lt 11 ] || { [ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 5 ]; }; then
            echo "::error::npm $NPM_VERSION does not support OIDC Trusted Publishing (requires >= 11.5.0)"
            exit 1
          fi
          echo "npm $NPM_VERSION supports OIDC Trusted Publishing"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token request URL is available"
          else
            echo "::error::ACTIONS_ID_TOKEN_REQUEST_URL is not set — id-token: write permission may be missing"
            exit 1
          fi
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-<unset>}"
          echo "npm config:"
          npm config list

      - name: Build all packages
        run: bun run build:all

      - name: Publish to npm
        run: bun run changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
